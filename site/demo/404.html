<style>
  :root{
    --dark:#1b362e; --mint:#eef3f1; --teal:#206a5d; --gold:#f1c84b;
    --ink:#22312f; --muted:#54655f; --head:#1b362e; --line:#d8e3de;
  }
  @media (prefers-color-scheme: dark){
    :root{--mint:#11201b; --ink:#dce8e2; --muted:#93a89f; --head:#eaf3ee;

  *{box-sizing:border-box;margin:0;padding:0}

  a{color:var(--teal)}
  .wrap{max-width:56rem;margin:0 auto;padding:0 1.25rem;width:100%}
  header{background:var(--dark);padding:.9rem 0}
  .brand{font-size:1.25rem;font-weight:700;color:#fff;text-decoration:none;letter-spacing:.01em}
  .brand span{color:var(--gold)}
  main{flex:1;display:grid;place-items:center;padding:3rem 0}
  .box{max-width:36rem}
  .code{font-size:clamp(3rem,12vw,5.5rem);line-height:1;color:var(--head);font-weight:700;letter-spacing:.02em}
  h1{font-size:1.35rem;color:var(--head);margin:.6rem 0 .8rem;line-height:1.2}
  p{color:var(--muted);margin-bottom:1rem;max-width:48ch}
